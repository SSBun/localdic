<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "AppleSpell" }}</title>
  <meta name="description" content="{{ page.description | default: 'A beautiful native macOS app for managing your local dictionary' }}">
  <meta name="author" content="{{ site.github_username }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: 'AppleSpell' }}">
  <meta property="og:description" content="{{ page.description | default: 'A beautiful native macOS app for managing your local dictionary' }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: 'AppleSpell' }}">
  <meta name="twitter:description" content="{{ page.description | default: 'A beautiful native macOS app for managing your local dictionary' }}">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
